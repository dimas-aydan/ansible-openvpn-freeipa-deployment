- name: Create /etc/systemd/system/openvpn-server@server.service.d folder
  file: 
    mode: 755
    path: /etc/systemd/system/openvpn-server@server.service.d
    state: directory
    
- name: Set up openvpn-server@server override 
  template: 
    src: override.conf.j2
    dest: /etc/systemd/system/openvpn-server@server.service.d/override.conf
    mode: 644
  notify:
    - Restart openvpn-server
